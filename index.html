<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JJO & MOON Director 📺</title>
  <meta name="description" content="JJO와 MOON이 큐레이션한 유튜브 플레이리스트" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ───────── HEADER ───────── -->
  <header class="header" id="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <rect width="24" height="24" rx="6" fill="url(#grad1)"/>
            <polygon points="10,8 17,12 10,16" fill="white"/>
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="24" y2="24">
                <stop offset="0%" stop-color="#ff416c"/>
                <stop offset="100%" stop-color="#ff4b2b"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">JJO<span class="amp">&</span>MOON</span>
      </div>

      <div class="search-bar" id="searchBar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="영상 검색..." autocomplete="off" />
        <button class="search-clear" id="searchClear" aria-label="검색어 지우기">✕</button>
      </div>

      <div class="header-actions">
        <button class="btn-sort" id="btnSort" title="정렬">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/>
            <line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/>
          </svg>
        </button>
        <button class="btn-layout" id="btnLayout" title="레이아웃">
          <svg class="icon-grid" viewBox="0 0 24 24" fill="currentColor">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <svg class="icon-list" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
        <div class="video-count-badge" id="videoCount">0 videos</div>
      </div>
    </div>
  </header>

  <!-- ───────── HERO ───────── -->
  <section class="hero" id="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-pill">조은지와문준현의 알콩달콩 스토리</div>
      <h1 class="hero-title">JJO <span class="grad-text">&</span> MOON<br/>Director</h1>
      <p class="hero-sub">우리가 엄선한 최고의 영상들을 한 곳에서 감상하세요</p>
      <div class="hero-stats" id="heroStats">
        <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-label">영상</span></div>
      </div>
    </div>
    <div class="hero-scroll-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
  </section>

  <!-- ───────── FILTER TABS ───────── -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="loading">로딩 중...</button>
  </div>

  <!-- ───────── MAIN CONTENT ───────── -->
  <main class="main-content">
    <!-- Skeleton loaders -->
    <div class="video-grid" id="videoGrid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">🔍</div>
      <h3>영상을 찾을 수 없어요</h3>
      <p>다른 검색어로 시도해보세요</p>
    </div>
  </main>

  <!-- ───────── VIDEO MODAL ───────── -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="modal-video-wrapper">
        <iframe id="modalIframe" src="" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" frameborder="0"></iframe>
      </div>
      <div class="modal-info">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-meta">
          <span class="modal-channel" id="modalChannel"></span>
          <a class="modal-yt-link" id="modalYtLink" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-2.75 12.35 12.35 0 0 0-8.74 2.83C4.92 9.05 4 11.4 4 13.87c0 3.27 2.06 6.16 5.2 7.34A12.34 12.34 0 0 0 20 13.87a12.2 12.2 0 0 0-.41-7.18zm-7.59 9.56a5.25 5.25 0 1 1 0-10.5 5.25 5.25 0 0 1 0 10.5zm0-8.5a3.25 3.25 0 1 0 0 6.5 3.25 3.25 0 0 0 0-6.5z"/></svg>
            YouTube에서 보기
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- ───────── TOAST ───────── -->
  <div class="toast" id="toast"></div>

  <!-- ───────── FOOTER ───────── -->
  <footer class="footer">
    <p>Made with ❤️ by <strong>JJO & MOON</strong> · videos.txt를 수정해서 영상을 추가하세요</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
